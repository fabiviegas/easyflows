<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Easy Flows</title>

  <link rel="stylesheet" href="assets/css/main.css">

</head>

<body>

  <section class="page__hero">

    <!-- BACKGROUND GLOWS -->

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="glow glow-4"></div>
    <div class="glow glow-5"></div>
    <div class="glow glow-6"></div>

    <!-- CENTRAL CORE -->

    <div class="hero-core">
      <img class="hero-logo" src="assets/img/isotipo-motion.svg" alt="Easy Flows" >
    </div>

    <!-- SVG LAYER -->

    <div class="hero-svg">

      <!-- CIRCLES -->
      <img class="circle circle-1" src="assets/img/circle-1.svg" alt="Elipse">
      <img class="circle circle-2" src="assets/img/circle-2.svg" alt="Elipse">
      <img class="circle circle-3" src="assets/img/circle-3.svg" alt="Elipse">

      <!-- CONNECTION LINES -->

      <img class="line line-green-1" src="assets/img/line-green-1.svg" alt="">
      <img class="line line-blue-2" src="assets/img/line-blue-2.svg" alt="">
      <img class="line line-purple-3" src="assets/img/line-purple-3.svg" alt="">
      <img class="line line-green-4" src="assets/img/line-green-4.svg" alt="">
      <img class="line line-yellow-5" src="assets/img/line-yellow-5.svg" alt="">

      <!-- DOTS -->

      <img class="dot dot-green dot-green-1" src="assets/img/dot-green.svg" alt="">
      <img class="dot dot-green dot-green-2" src="assets/img/dot-green.svg" alt="">
      <img class="dot dot-green dot-green-3" src="assets/img/dot-green.svg" alt="">
      <img class="dot dot-green dot-green-4" src="assets/img/dot-green.svg" alt="">
      <img class="dot dot-blue dot-blue-1"  src="assets/img/dot-blue.svg"  alt="">
      <img class="dot dot-blue dot-blue-2"  src="assets/img/dot-blue.svg"  alt="">
      <img class="dot dot-purple dot-purple-1" src="assets/img/dot-purple.svg" alt="">
      <img class="dot dot-purple dot-purple-2" src="assets/img/dot-purple.svg" alt="">
      <img class="dot dot-yellow dot-yellow-1" src="assets/img/dot-yellow.svg" alt="">
      <img class="dot dot-yellow dot-yellow-2" src="assets/img/dot-yellow.svg" alt="">
      <img class="dot dot-yellow-small" src="assets/img/dot-yellow-small.svg" alt="">
      <img class="dot dot-blue-small" src="assets/img/dot-blue-small.svg" alt="">
       <img class="dot dot-green-small" src="assets/img/dot-green-small.svg" alt="">

    </div>    

    <!-- FLOW CARDS -->

    <div class="flow-card card-1">
      <div class="card-icon">
        <img src="assets/img/icon-card-1.svg" alt="">
      </div>
      <div class="card-content">
        <h3>Mensagem recebida</h3>
        <div class="info">
          <p>WhatsApp</p>
          <span>Agora</span>
        </div>
      </div>
    </div>

    <div class="flow-card card-2">
      <div class="card-icon">
        <img src="assets/img/icon-card-2.svg" alt="">
      </div>
      <div class="card-content">
        <h3 class="active">Fluxo iniciado</h3>
      </div>
    </div>

    <div class="flow-card card-3">
      <div class="card-icon">
        <img src="assets/img/icon-card-3.svg" alt="">
      </div>
      <div class="card-content">
        <h3>Documento criado</h3>
        <div class="info">
          <p>Contrato.pdf</p>
          <span>2 min atrás</span>
        </div>        
      </div>
    </div>

    <div class="flow-card card-4">
      <img src="assets/img/icon-card-4.svg" alt="">
      <div class="card-content">
        <h3 class="active">Processo concluído</h3>
      </div>
    </div>

    <div class="flow-card card-5">
      <div class="card-icon">
        <img src="assets/img/icon-card-5.svg" alt="">
      </div>
      <div class="card-content">
        <h3>Assinatura concluída</h3>
        <div class="info">
          <p>João Silva</p>
          <span>5 min atrás</span>
        </div>
      </div>
    </div>

    <div class="flow-card card-6">
      <div class="card-icon">
        <img src="assets/img/icon-card-6.svg" alt="">
      </div>
      <div class="card-content">
        <h3>Notificação enviada</h3>
        <div class="info">
          <p>Setor Financeiro</p>
          <span>7 min atrás</span>
        </div>      
      </div>
    </div>

    <div class="flow-card card-7">
      <img src="assets/img/icon-card-7.svg" alt="">
      <span>Automação ativa</span>
    </div>

    <div class="flow-card card-8">
      <div class="card-icon">
        <img src="assets/img/icon-card-8.svg" alt="">
      </div>
      <div class="card-content">
        <h3>Documento arquivado</h3>
        <div class="info">
          <p>Repositório</p>
          <span>10 min atrás</span>
        </div>
      </div>
    </div>

  </section>

</body>

</html>
